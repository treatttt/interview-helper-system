<!DOCTYPE html>
<html lang="ru" xml:lang="ru">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Тренажёр для подготовки к собеседованиям — вопросы по аналитике, разработке и тестированию.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="interview_helper">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>interview_helper</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Shown only when flutter_bootstrap.js fails to load (e.g. offline). */
    #network-error {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1a1a1a;
      text-align: center;
      padding: 32px;
      box-sizing: border-box;
    }
    #network-error svg {
      opacity: 0.35;
    }
    #network-error h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
    }
    #network-error p {
      margin: 0;
      font-size: 15px;
      color: #555;
      max-width: 320px;
    }
    #network-error button {
      margin-top: 8px;
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      background: #6750a4;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }
    #network-error button:hover {
      background: #7965af;
    }
  </style>
</head>
<body>
  <!-- Fallback: displayed if flutter_bootstrap.js cannot be fetched (offline / server unreachable). -->
  <div id="network-error" role="alert" aria-live="assertive">
    <!-- wifi-off icon (Material Symbols outline, path only — no external resources) -->
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
         stroke-linejoin="round" aria-hidden="true">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <h2>Нет подключения к интернету</h2>
    <p>Приложение не загрузилось. Проверьте соединение и обновите страницу.</p>
    <button onclick="location.reload()">Обновить страницу</button>
  </div>

  <script>
    // Called by onerror on the bootstrap script below.
    function _showNetworkError() {
      var el = document.getElementById('network-error');
      if (el) el.style.display = 'flex';
    }
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async onerror="_showNetworkError()"></script>
</body>
</html>
