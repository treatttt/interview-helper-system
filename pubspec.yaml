name: interview_helper_system
description: "Тренажёр для подготовки к собеседованиям (System Analyst Junior)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2                 # запросы к твоему серверу (на будущее)
  shared_preferences: ^2.5.5   # локальное хранение прогресса и streak
dev_dependencies:
  dart_code_linter: ^4.1.5
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/questions.json
