# Dependabot: автообновление зависимостей + версий GitHub Actions.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # --- Dart/Flutter зависимости (pubspec.yaml + pubspec.lock) ---
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      # Минорные/патч-апдейты - одним PR, чтобы не плодить шум.
      dart-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # --- Версии самих GitHub Actions (.github/workflows) ---
  # Dependabot бампит и SHA, и коммент `# vX.Y.Z`.
  # Снимает ручной апдейт пиннингов.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      actions-all:
        patterns:
          - "*"