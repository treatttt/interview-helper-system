name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read          # только чтение репозитория для checkout
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5c7944e73c4c2a096b17a9cb74d65b6c2bbafbde # v2.9.1
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
      - run: flutter pub get --enforce-lockfile

      # Две версии из одного коммита в один артефакт Pages:
      #   /          → команда   (FEEDBACK_URL_TEAM)
      #   /testers/  → тестеры   (FEEDBACK_URL_TESTERS)
      # Тестерский билд собирается первым и отодвигается в /tmp, чтобы второй
      # билд стартовал с чистого build/web; затем вкладывается как подпапка.
      - name: Build testers version (/testers)
        env:
          FEEDBACK_URL: ${{ vars.FEEDBACK_URL_TESTERS }}
        run: |
          flutter build web --release \
            --base-href /interview-helper-system/testers/ \
            --dart-define=FEEDBACK=true \
            --dart-define=FEEDBACK_URL=$FEEDBACK_URL
          mv build/web /tmp/testers

      - name: Build team version (root)
        env:
          FEEDBACK_URL: ${{ vars.FEEDBACK_URL_TEAM }}
        run: |
          flutter build web --release \
            --base-href /interview-helper-system/ \
            --dart-define=FEEDBACK=true \
            --dart-define=FEEDBACK_URL=$FEEDBACK_URL
          mv /tmp/testers build/web/testers

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write            # публикация на Pages
      id-token: write         # OIDC-токен для deploy-pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5c7944e73c4c2a096b17a9cb74d65b6c2bbafbde # v2.9.1
        with:
          egress-policy: audit

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0