# OSV-Scanner: сверяет зависимости (pubspec.lock и др.) с живой базой OSV.dev.
#   scan-pr        — флагует только НОВЫЕ уязвимости, внесённые PR / merge-queue.
#   scan-scheduled — ловит свежераскрытые CVE в уже существующих зависимостях.
# Результаты уходят в Security > Code Scanning (бесплатно для публичных репо).
# Action third-party (Google), не сертифицирован GitHub — пин по commit-SHA.
name: OSV-Scanner

on:
  pull_request:
    branches: [ "main" ]
  merge_group:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  schedule:
    - cron: '16 3 * * 6'   # суббота, 03:16 UTC
  workflow_dispatch:

permissions: {}            # deny-all по умолчанию; права выдаются пожобно

jobs:
  scan-scheduled:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' }}
    permissions:
      actions: read
      contents: read
      security-events: write   # загрузка SARIF в Code Scanning
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        -r
        --skip-git
        ./

  scan-pr:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        -r
        --skip-git
        ./
